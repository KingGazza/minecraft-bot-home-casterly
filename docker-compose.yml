version: '3.8'

services:
  # ============================================
  # 1. Java Minecraft Server (Paper)
  # ============================================
  minecraft-java:
    image: itzg/minecraft-server:latest
    container_name: java_server
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.20.4"
      MEMORY: "2G"
      ENABLE_RCON: "true"
      RCON_PORT: 25575
      RCON_PASSWORD: "${RCON_PASSWORD}"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "10"
      MAX_PLAYERS: "20"
      ONLINE_MODE: "false"
      PLUGINS: "https://github.com/ViaVersion/ViaVersion/releases/download/5.10.0/ViaVersion-5.10.0.jar"
    ports:
      - "25566:25565"
      - "${RCON_PORT:-25576}:25575"
    volumes:
      - ./java_data:/data
    restart: unless-stopped
    networks:
      - minecraft-network

  # ============================================
  # 2. GeyserMC (Bedrock <-> Java translator)
  # ============================================
  geyser:
    build:
      context: ./geyser-config
      dockerfile: Dockerfile
    container_name: geyser
    ports:
      - "19133:19132/udp"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network

  # ============================================
  # Nox's bots
  # ============================================
  fighter-nox:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: fighter_nox
    environment:
      - BOT_NAME=Mr_Angry_Nox
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=NoxGTLG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot1_v2.js

  gatherer-nox:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: gatherer_nox
    environment:
      - BOT_NAME=Mr_Helpful_Nox
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=NoxGTLG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot2_v2.js


# ============================================
# Networks
# ============================================
networks:
  minecraft-network:
    driver: bridge
