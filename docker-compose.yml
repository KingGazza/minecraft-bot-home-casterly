version: '3.8'

services:
  # ============================================
  # 1. Java Minecraft Server (Paper)
  # ============================================
  minecraft-java:
    image: itzg/minecraft-server:latest
    container_name: java_server
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.20.4"
      MEMORY: "2G"
      ENABLE_RCON: "true"
      RCON_PORT: 25575
      RCON_PASSWORD: "${RCON_PASSWORD}"  # Portainer stack variable
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "10"
      MAX_PLAYERS: "20"
      ONLINE_MODE: "false"
    ports:
      - "${MINECRAFT_PORT:-25565}:25565"
      - "${RCON_PORT:-25575}:25575"
    volumes:
      - ./java_data:/data
    restart: unless-stopped
    networks:
      - minecraft-network

  # ============================================
  # 2. GeyserMC (Bedrock <-> Java translator)
  # ============================================
  geyser:
    image: bmoorman/geyser:latest
    container_name: geyser
    environment:
      GEYSER_ADDRESS: "0.0.0.0"
      GEYSER_PORT: 19132
      REMOTE_ADDRESS: "minecraft-java"
      REMOTE_PORT: 25565
      AUTH_TYPE: "floodgate"
    ports:
      - "${GEYSER_PORT:-19132}:19132/udp"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network

  # ============================================
  # 3. Bot 1 - Fighter/Guardian
  # ============================================
  bot-fighter:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: bot_fighter
    environment:
      - BOT_NAME=Mr_Angry
      - BOT_ROLE=fighter
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=${PLAYER_NAME}  # Portainer stack variable
      - RCON_PASSWORD=${RCON_PASSWORD}  # Pass through for potential RCON use
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    volumes:
      - ./bots:/app
    command: node /app/bot1.js

  # ============================================
  # 4. Bot 2 - Gatherer/Builder
  # ============================================
  bot-gatherer:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: bot_gatherer
    environment:
      - BOT_NAME=Mr_Helpful
      - BOT_ROLE=gatherer
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=${PLAYER_NAME}  # Portainer stack variable
      - RCON_PASSWORD=${RCON_PASSWORD}  # Pass through for potential RCON use
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    volumes:
      - ./bots:/app
    command: node /app/bot2.js

# ============================================
# Networks
# ============================================
networks:
  minecraft-network:
    driver: bridge
