version: '3.8'

services:
  # ============================================
  # 1. Java Minecraft Server (Paper)
  # ============================================
  minecraft-java:
    image: itzg/minecraft-server:latest
    container_name: java_server
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.5"
      MEMORY: "2G"
      ENABLE_RCON: "true"
      RCON_PORT: 25575
      RCON_PASSWORD: "${RCON_PASSWORD}"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "10"
      MAX_PLAYERS: "20"
      ONLINE_MODE: "false"
    ports:
      - "${MINECRAFT_PORT:-25565}:25565"
      - "${RCON_PORT:-25575}:25575"
    volumes:
      - ./java_data:/data
    restart: unless-stopped
    networks:
      - minecraft-network

  # ============================================
  # 2. GeyserMC (Bedrock <-> Java translator)
  # ============================================
  geyser:
    build:
      context: ./geyser-config
      dockerfile: Dockerfile
    container_name: geyser
    ports:
      - "${GEYSER_PORT:-19132}:19132/udp"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network

  # ============================================
  # Nox's bots
  # ============================================
  fighter-nox:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: fighter_nox
    environment:
      - BOT_NAME=Mr_Angry_Nox
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=Nox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot1.js

  gatherer-nox:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: gatherer_nox
    environment:
      - BOT_NAME=Mr_Helpful_Nox
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=Nox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot2.js

  # ============================================
  # KAT's bots
  # ============================================
  fighter-kat:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: fighter_kat
    environment:
      - BOT_NAME=Mr_Angry_KAT
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=KAT
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot1.js

  gatherer-kat:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: gatherer_kat
    environment:
      - BOT_NAME=Mr_Helpful_KAT
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=KAT
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot2.js

  # ============================================
  # NED's bots
  # ============================================
  fighter-ned:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: fighter_ned
    environment:
      - BOT_NAME=Mr_Angry_NED
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=NED
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot1.js

  gatherer-ned:
    build:
      context: ./bots
      dockerfile: Dockerfile.bot
    container_name: gatherer_ned
    environment:
      - BOT_NAME=Mr_Helpful_NED
      - MC_HOST=minecraft-java
      - MC_PORT=25565
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - PLAYER_NAME=NED
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minecraft-java
    restart: unless-stopped
    networks:
      - minecraft-network
    command: node /app/bot2.js

# ============================================
# Networks
# ============================================
networks:
  minecraft-network:
    driver: bridge
